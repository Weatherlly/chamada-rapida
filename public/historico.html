<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Chamadas</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .nav-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      justify-content: center;
    }
    .nav-bar a {
      text-decoration: none;
      background: #e2e8f0;
      padding: 8px 20px;
      border-radius: 40px;
      color: #1e293b;
      font-weight: bold;
    }
    .nav-bar a.active {
      background: #3b82f6;
      color: white;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }
    th {
      background: #f8fafc;
      font-weight: 600;
    }
    .actions button {
      width: auto;
      padding: 6px 12px;
      margin: 0 4px;
      font-size: 0.8rem;
    }
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      max-width: 90%;
      width: 600px;
      max-height: 80%;
      overflow-y: auto;
      border-radius: 24px;
      padding: 20px;
    }
    .close-modal {
      float: right;
      cursor: pointer;
      font-size: 1.5rem;
    }
    .student-editor {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      padding: 8px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-bar">
      <a href="index.html">📋 Nova Chamada</a>
      <a href="historico.html" class="active">📜 Histórico</a>
    </div>
    <h1>Histórico de Chamadas</h1>
    <div id="historyList">
      <table id="attendanceTable">
        <thead>
          <tr><th>Data</th><th>Turma</th><th>Etapa</th><th>Ações</th></tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal de edição -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <span class="close-modal">&times;</span>
      <h2>Editar Chamada</h2>
      <div id="editStudentsList"></div>
      <button id="saveEditBtn" class="btn-save">Salvar alterações</button>
    </div>
  </div>

  <script>
    let currentEditId = null;
    let currentAttendanceMap = {};

    async function loadHistory() {
      const res = await fetch('/api/attendance/all');
      const records = await res.json();
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      records.sort((a,b) => new Date(b.date) - new Date(a.date));
      for (const rec of records) {
        const row = tbody.insertRow();
        row.insertCell(0).textContent = rec.date;
        row.insertCell(1).textContent = rec.className;
        row.insertCell(2).textContent = rec.etapa;
        const actions = row.insertCell(3);
        actions.className = 'actions';
        const editBtn = document.createElement('button');
        editBtn.textContent = '✏️ Editar';
        editBtn.classList.add('status-btn');
        editBtn.onclick = () => openEditModal(rec.id, rec.classId, rec.date);
        const deleteBtn = document.createElement('button');
        deleteBtn.textContent = '🗑️ Deletar';
        deleteBtn.classList.add('status-btn');
        deleteBtn.style.background = '#ef4444';
        deleteBtn.style.color = 'white';
        deleteBtn.onclick = () => deleteAttendance(rec.id);
        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);
      }
    }

    async function openEditModal(attendanceId, classId, date) {
      // Buscar dados atuais da chamada
      const res = await fetch(`/api/attendance/${classId}/${date}`);
      const attendanceMap = await res.json();
      currentAttendanceMap = attendanceMap;
      currentEditId = attendanceId;

      // Buscar lista de alunos da turma
      const studentsRes = await fetch(`/api/students/${classId}`);
      const students = await studentsRes.json();

      const container = document.getElementById('editStudentsList');
      container.innerHTML = '';
      for (const student of students) {
        const status = currentAttendanceMap[student.id] || 'present';
        const div = document.createElement('div');
        div.className = 'student-editor';
        div.innerHTML = `
          <span><strong>${student.name}</strong></span>
          <div>
            <button class="status-btn present ${status === 'present' ? 'selected' : ''}" data-id="${student.id}" data-status="present">✅ Presente</button>
            <button class="status-btn absent ${status === 'absent' ? 'selected' : ''}" data-id="${student.id}" data-status="absent">❌ Ausente</button>
          </div>
        `;
        container.appendChild(div);
      }

      // Adicionar eventos aos botões dentro do modal
      document.querySelectorAll('#editStudentsList .status-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const studentId = btn.getAttribute('data-id');
          const newStatus = btn.getAttribute('data-status');
          currentAttendanceMap[studentId] = newStatus;
          // Atualizar visual dos botões deste aluno
          const parent = btn.parentElement;
          parent.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
      });

      document.getElementById('editModal').style.display = 'flex';
    }

    async function saveEdit() {
      if (!currentEditId) return;
      const res = await fetch(`/api/attendance/${currentEditId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ attendanceMap: currentAttendanceMap })
      });
      if (res.ok) {
        alert('Chamada atualizada com sucesso!');
        closeModal();
        loadHistory();
      } else {
        alert('Erro ao atualizar');
      }
    }

    async function deleteAttendance(id) {
      if (confirm('Tem certeza que deseja excluir esta chamada?')) {
        const res = await fetch(`/api/attendance/${id}`, { method: 'DELETE' });
        if (res.ok) {
          alert('Chamada deletada');
          loadHistory();
        } else {
          alert('Erro ao deletar');
        }
      }
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
      currentEditId = null;
    }

    document.querySelector('.close-modal').addEventListener('click', closeModal);
    document.getElementById('saveEditBtn').addEventListener('click', saveEdit);
    window.addEventListener('click', (e) => {
      if (e.target === document.getElementById('editModal')) closeModal();
    });

    loadHistory();
  </script>
</body>
</html>
